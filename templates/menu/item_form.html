{% extends "base.html" %}

{% block title %}
{% if object %}
Edit Menu Item
{% else %}
Add Menu Item
{% endif %}
{% endblock %}

{% block content %}

<div class="card">

    <div class="card-header">

        <h4 class="mb-0">

            {% if object %}
                Edit Menu Item
            {% else %}
                Add Menu Item
            {% endif %}

        </h4>

    </div>

    <div class="card-body">

        <form method="post" enctype="multipart/form-data">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success">
                <i class="bi bi-check-circle"></i>
                Save
            </button>

            <a href="{% url 'menu:item-list' %}" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
