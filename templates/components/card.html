<div class="card shadow-sm border-0 h-100">
    <div class="card-body d-flex justify-content-between align-items-center">
        <div>
            <h6 class="text-muted mb-2">{{ title }}</h6>
            <h3 class="mb-0">{{ value }}</h3>
        </div>

        {% if icon %}
            <i class="bi {{ icon }} fs-1 text-primary"></i>
        {% endif %}
    </div>
</div>
