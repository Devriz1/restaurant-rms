<div class="card shadow-sm border-0 h-100">

    <div class="card-body">

        <div class="d-flex justify-content-between align-items-center">

            <div>

                <small class="text-muted">{{ title }}</small>

                <h3 class="mt-2 fw-bold">{{ value }}</h3>

            </div>

            {% if icon %}
                <div class="fs-2 text-primary">
                    <i class="bi {{ icon }}"></i>
                </div>
            {% endif %}

        </div>

    </div>

</div>
