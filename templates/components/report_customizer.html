<div id="reportCustomizer" class="report-customizer">

    <div class="customizer-overlay"></div>

    <div class="customizer-panel">

        <!-- ========================================= -->
        <!-- HEADER -->
        <!-- ========================================= -->

        <div class="customizer-header">

            <h3>
                <i class="bi bi-layout-three-columns"></i>
                Customize Report
            </h3>

            <button
                type="button"
                id="closeCustomizer"
                class="close-btn">

                <i class="bi bi-x-lg"></i>

            </button>

        </div>


        <!-- ========================================= -->
        <!-- BODY -->
        <!-- ========================================= -->

<div class="customizer-body">

    <div id="columnList">

        <div class="column-option">

            <span class="drag-handle">
                <i class="bi bi-grip-vertical"></i>
            </span>

            <input
                type="checkbox"
                checked
                data-column="bill">

            <span>Bill Number</span>

        </div>

        <div class="column-option">

            <span class="drag-handle">
                <i class="bi bi-grip-vertical"></i>
            </span>

            <input
                type="checkbox"
                checked
                data-column="date">

            <span>Date</span>

        </div>

        <div class="column-option">

            <span class="drag-handle">
                <i class="bi bi-grip-vertical"></i>
            </span>

            <input
                type="checkbox"
                checked
                data-column="floor">

            <span>Floor</span>

        </div>

        <div class="column-option">

            <span class="drag-handle">
                <i class="bi bi-grip-vertical"></i>
            </span>

            <input
                type="checkbox"
                checked
                data-column="table">

            <span>Table</span>

        </div>

        <div class="column-option">

            <span class="drag-handle">
                <i class="bi bi-grip-vertical"></i>
            </span>

            <input
                type="checkbox"
                checked
                data-column="guest">

            <span>Guest</span>

        </div>

        <div class="column-option">

            <span class="drag-handle">
                <i class="bi bi-grip-vertical"></i>
            </span>

            <input
                type="checkbox"
                checked
                data-column="total">

            <span>Total</span>

        </div>

        <div class="column-option">

            <span class="drag-handle">
                <i class="bi bi-grip-vertical"></i>
            </span>

            <input
                type="checkbox"
                checked
                data-column="cashier">

            <span>Cashier</span>

        </div>

        <div class="column-option">

            <span class="drag-handle">
                <i class="bi bi-grip-vertical"></i>
            </span>

            <input
                type="checkbox"
                checked
                data-column="status">

            <span>Status</span>

        </div>

    </div>

</div>


        <!-- ========================================= -->
        <!-- FOOTER -->
        <!-- ========================================= -->

        <div class="customizer-footer">

            <button
                type="button"
                id="resetColumns"
                class="btn btn-outline-secondary">

                <i class="bi bi-arrow-counterclockwise"></i>

                Reset

            </button>


            <button
                type="button"
                id="applyColumns"
                class="btn btn-primary">

                <i class="bi bi-check-circle"></i>

                Apply

            </button>

        </div>

    </div>

</div>
