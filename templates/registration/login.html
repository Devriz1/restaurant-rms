{% extends "base.html" %}

{% block content %}
<div class="container mt-5" style="max-width:400px">

<h3>Login</h3>

<form method="post">
    {% csrf_token %}

    {{ form.username.label_tag }}
    {{ form.username }}

    <br>

    {{ form.password.label_tag }}
    {{ form.password }}

    <br>

    <button class="btn btn-primary w-100">
        Login
    </button>

</form>

</div>
{% endblock %}
