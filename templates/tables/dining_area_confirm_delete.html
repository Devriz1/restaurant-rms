{% extends "base.html" %}

{% block title %}Delete Dining Area{% endblock %}

{% block content %}

<div class="card">

    <div class="card-header">
        <h4>Delete Dining Area</h4>
    </div>

    <div class="card-body">

        <p>
            Are you sure you want to delete
            <strong>{{ object.name }}</strong>?
        </p>

        <form method="post">

            {% csrf_token %}

            <button type="submit" class="btn btn-danger">
                Delete
            </button>

            <a href="{% url 'tables:area-list' %}" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
