{% extends "base.html" %}

{% block title %}Add Dining Area{% endblock %}

{% block content %}

<div class="card">

    <div class="card-header">
        <h4>Add Dining Area</h4>
    </div>

    <div class="card-body">

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button class="btn btn-primary">
                Save
            </button>

            <a href="{% url 'tables:area-list' %}" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

</div>

{% endblock %}
